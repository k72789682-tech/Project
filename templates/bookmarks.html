<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            min-height:100vh;
            padding:40px;
            background:linear-gradient(135deg,#5b21b6,#7c3aed,#4f46e5);
            color:white;
        }
        .container{
            max-width:1000px;
            margin:auto;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(14px);
            border-radius:24px;
            padding:30px;
            border:1px solid rgba(255,255,255,0.15);
        }
        h1{margin-bottom:25px;}
        .top-buttons{margin-bottom:20px;}
        .top-buttons a{
            text-decoration:none;
            padding:10px 18px;
            border-radius:10px;
            background:white;
            color:#5b21b6;
            margin-right:10px;
            font-weight:bold;
            display:inline-block;
            margin-bottom:10px;
        }
        table{
            width:100%;
            border-collapse:collapse;
            border-radius:14px;
            overflow:hidden;
        }
        th,td{
            padding:16px;
            text-align:left;
            vertical-align:middle;
        }
        th{background:rgba(255,255,255,0.18);}
        tr:nth-child(even){background:rgba(255,255,255,0.06);}
        tr:hover{background:rgba(255,255,255,0.12);}
        .delete-btn{
            background:#ef4444;
            color:white;
            cursor:pointer;
            padding:8px 10px;
            border:none;
            border-radius:8px;
        }
        .message{
            margin-bottom:15px;
            padding:12px;
            border-radius:10px;
            background:rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Bookmarks</h1>

        <div class="top-buttons">
            <a href="/dashboard/">Dashboard</a>
            <a href="/tasks/">Back to Tasks</a>
        </div>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <table>
            <tr>
                <th>ID</th>
                <th>Item ID</th>
                <th>Title</th>
                <th>Type</th>
                <th>Delete</th>
            </tr>

            {% for bookmark in bookmarks %}
            <tr>
                <td>{{ bookmark.id }}</td>
                <td>{{ bookmark.item_id }}</td>
                <td>{{ bookmark.title }}</td>
                <td>{{ bookmark.type }}</td>
                <td>
                    <a href="/delete-bookmark/{{ bookmark.id }}/">
                        <button class="delete-btn" type="button">Delete</button>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No bookmarks found.</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
