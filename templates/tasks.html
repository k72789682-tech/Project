<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            min-height:100vh;
            padding:40px;
            background:linear-gradient(135deg,#5b21b6,#7c3aed,#4f46e5);
            color:white;
        }
        .container{
            max-width:1200px;
            margin:auto;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(14px);
            border-radius:24px;
            padding:30px;
            border:1px solid rgba(255,255,255,0.15);
        }
        h1{margin-bottom:25px;}
        .top-buttons{margin-bottom:20px;}
        .top-buttons a{
            text-decoration:none;
            padding:10px 18px;
            border-radius:10px;
            background:white;
            color:#5b21b6;
            margin-right:10px;
            font-weight:bold;
        }
        table{
            width:100%;
            border-collapse:collapse;
            border-radius:14px;
            overflow:hidden;
        }
        th,td{
            padding:16px;
            text-align:left;
            vertical-align:middle;
        }
        th{background:rgba(255,255,255,0.18);}
        tr:nth-child(even){background:rgba(255,255,255,0.06);}
        tr:hover{background:rgba(255,255,255,0.12);}
        select, button{
            padding:8px 10px;
            border:none;
            border-radius:8px;
        }
        .delete-btn{
            background:#ef4444;
            color:white;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task List</h1>

        <div class="top-buttons">
            <a href="/dashboard/">Dashboard</a>
            <a href="/add-task/">Add Task</a>
        </div>

        <table>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Delete</th>
            </tr>

            {% for task in tasks %}
            <tr>
                <td>{{ task.id }}</td>
                <td>{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>{{ task.priority }}</td>
                <td>{{ task.due_date }}</td>
                <td>
                    <form method="POST" action="/update-task/{{ task.id }}/">
                        {% csrf_token %}
                        <select name="status" onchange="this.form.submit()">
                            <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                            <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                            <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                        </select>
                    </form>
                </td>
                <td>
                    <form method="POST" action="/delete-task/{{ task.id }}/">
                        {% csrf_token %}
                        <button class="delete-btn" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <script>
        setInterval(function() {
            window.location.reload();
        }, 5000);
    </script>
</body>
</html>
