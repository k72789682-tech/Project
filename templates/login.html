<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Task Manager</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.12), transparent 30%),
                linear-gradient(135deg,#5b21b6,#7c3aed,#4338ca);
            overflow:hidden;
        }

        .container{
            width:100%;
            max-width:430px;
            padding:20px;
        }

        .login-card{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.18);
            border-radius:28px;
            padding:40px 35px;
            box-shadow:0 25px 50px rgba(0,0,0,0.25);
            color:white;
        }

        .tag{
            display:inline-block;
            padding:8px 18px;
            border-radius:999px;
            background:rgba(255,255,255,0.12);
            font-size:12px;
            letter-spacing:2px;
            margin-bottom:20px;
        }

        h1{
            font-size:42px;
            line-height:1.1;
            margin-bottom:10px;
        }

        .subtitle{
            color:rgba(255,255,255,0.78);
            margin-bottom:30px;
            line-height:1.5;
            font-size:15px;
        }

        .field{
            margin-bottom:18px;
        }

        .field label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            color:rgba(255,255,255,0.92);
        }

        .field input{
            width:100%;
            padding:15px 18px;
            border:none;
            border-radius:14px;
            outline:none;
            background:rgba(255,255,255,0.14);
            color:white;
            font-size:15px;
        }

        .field input::placeholder{
            color:rgba(255,255,255,0.55);
        }

        .login-btn{
            width:100%;
            margin-top:10px;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(to right,#8b5cf6,#6366f1);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(0,0,0,0.25);
        }

        .register-link{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            text-decoration:none;
            padding:14px;
            border-radius:14px;
            background:rgba(255,255,255,0.10);
        }

        .message{
            margin-top:18px;
            padding:12px;
            border-radius:12px;
            background:rgba(255,0,0,0.15);
            color:#ffd6d6;
            text-align:center;
        }

        @media(max-width:500px){
            .login-card{
                padding:30px 22px;
            }

            h1{
                font-size:34px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">

            <div class="tag">TASK MANAGEMENT SYSTEM</div>

            <h1>Cloud Task Manager</h1>

            <div class="subtitle">
                Login to manage your tasks, reminders and calendar sync in one place.
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button class="login-btn" type="submit">Login</button>
            </form>

            {% if message %}
                <div class="message">{{ message }}</div>
            {% endif %}

            <a href="/register/" class="register-link">Create New Account</a>

        </div>
    </div>
</body>
</html>
