<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#5b21b6,#7c3aed,#4f46e5);
        }
        .card{
            width:420px;
            padding:35px;
            border-radius:24px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.15);
            color:white;
        }
        h1{text-align:center;margin-bottom:25px;}
        input{
            width:100%;
            padding:14px;
            margin-bottom:16px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.15);
            color:white;
        }
        input::placeholder{color:rgba(255,255,255,0.7);}
        button,.link{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            margin-top:10px;
            display:block;
            text-align:center;
            text-decoration:none;
            font-weight:bold;
        }
        button{background:white;color:#5b21b6;cursor:pointer;}
        .link{background:rgba(255,255,255,0.15);color:white;}
        .message{text-align:center;margin-top:15px;color:#ffd6d6;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <a href="/" class="link">Back to Login</a>
    </div>
</body>
</html>
