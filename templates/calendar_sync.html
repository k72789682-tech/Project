<!DOCTYPE html>
<html>
<head>
    <title>Calendar Sync</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #5f0fd1, #4f46e5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.12);
            padding: 35px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button, a {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border: none;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            box-sizing: border-box;
        }
        button {
            background: white;
            color: #5f0fd1;
            cursor: pointer;
        }
        a {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .message {
            margin-top: 18px;
            text-align: center;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Calendar Sync</h1>

        <form method="POST">
            {% csrf_token %}
            <label>Task ID</label>
            <input type="number" name="task_id" required>

            <button type="submit">Sync Task</button>
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        {% if event_link %}
            <a href="{{ event_link }}" target="_blank">Open Calendar Event</a>
        {% endif %}

        <a href="/dashboard/">Back to Dashboard</a>
    </div>
</body>
</html>
