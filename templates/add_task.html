<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #5b21b6, #7c3aed, #4f46e5);
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .message {
            margin-bottom: 20px;
            padding: 14px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fff;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255,255,255,0.7);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select option {
            color: black;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
        }

        .btn-create {
            background: white;
            color: #5b21b6;
        }

        .btn-create:hover {
            background: #ede9fe;
            transform: translateY(-2px);
        }

        .btn-back {
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-weight: bold;
            margin-top: 18px;
            transition: 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add New Task</h1>

        {% if message %}
            <div class="message">
                {{ message }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Task Title</label>
                <input type="text" name="title" placeholder="Enter task title" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Enter task description"></textarea>
            </div>

            <div class="form-group">
                <label>Priority</label>
                <select name="priority">
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div class="form-group">
                <label>Due Date</label>
                <input type="date" name="due_date" required>
            </div>

            <button type="submit" class="btn btn-create">
                Create Task
            </button>
        </form>

        <a href="/dashboard/" class="btn-back">
            Back to Dashboard
        </a>
    </div>
</body>
</html>
