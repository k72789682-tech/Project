name: Flask API CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Flask Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Flask app import
        run: |
          python -c "from app import app"

  cd:
    name: Flask Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r flask-deploy.zip . \
            -x "*.git*" \
               "*__pycache__*" \
               ".github/*" \
               "venv/*" \
               "*.pyc"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_FLASK }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_FLASK }}
          version_label: flask-${{ github.sha }}
          deployment_package: flask-deploy.zip
