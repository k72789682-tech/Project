name: Django CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Django Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: |
          python manage.py check

  cd:
    name: Django Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r django-deploy.zip . \
            -x "*.git*" \
               "*__pycache__*" \
               ".github/*" \
               "venv/*" \
               "*.pyc"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
            - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          region: ${{ secrets.AWS_REGION }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_DJANGO }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_DJANGO }}
          version_label: django-${{ github.sha }}
          deployment_package: django-deploy.zip
